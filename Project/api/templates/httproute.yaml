{{- if .Values.httpRoutes.enabled }}
{{- range .Values.httpRoutes.routes }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
spec:
  parentRefs:
    - name: {{ .parent.name }}
      namespace: {{ .parent.namespace }}
  hostnames:
    - {{ .hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - name: {{ .backend.name }}
          port: {{ .backend.port }}
---
{{- end }}
{{- end }}